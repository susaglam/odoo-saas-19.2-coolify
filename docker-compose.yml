# documentation: https://www.odoo.com/documentation/19.0/
# slogan: Odoo saas-19.2 - Open Source ERP & CRM
# tags: odoo, erp, crm, saas-19.2
# port: 8069

services:
  odoo:
    build:
      context: .
      dockerfile_inline: |
        FROM ubuntu:noble
        SHELL ["/bin/bash", "-xo", "pipefail", "-c"]

        ENV LANG=C.UTF-8
        ENV DEBIAN_FRONTEND=noninteractive

        RUN apt-get update && \
            apt-get install -y --no-install-recommends \
            ca-certificates curl dirmngr fonts-noto-cjk gnupg \
            libssl-dev node-less npm python3 python3-magic \
            python3-num2words python3-odf python3-pdfminer \
            python3-pip python3-phonenumbers python3-pyldap \
            python3-qrcode python3-renderpm python3-setuptools \
            python3-slugify python3-vobject python3-watchdog \
            python3-xlrd python3-xlwt xz-utils \
            build-essential python3-dev libxml2-dev libxslt1-dev \
            libldap2-dev libsasl2-dev libpq-dev libjpeg-dev \
            zlib1g-dev libfreetype6-dev && \
            rm -rf /var/lib/apt/lists/*

        RUN curl -o wkhtmltox.deb -sSL \
            "https://github.com/wkhtmltopdf/packaging/releases/download/0.12.6.1-3/wkhtmltox_0.12.6.1-3.jammy_amd64.deb" && \
            apt-get update && \
            apt-get install -y --no-install-recommends ./wkhtmltox.deb && \
            rm -f wkhtmltox.deb && rm -rf /var/lib/apt/lists/*

        RUN curl -sSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | \
            gpg --dearmor -o /usr/share/keyrings/pgdg-archive-keyring.gpg && \
            echo "deb [signed-by=/usr/share/keyrings/pgdg-archive-keyring.gpg] http://apt.postgresql.org/pub/repos/apt/ noble-pgdg main" \
            > /etc/apt/sources.list.d/pgdg.list && \
            apt-get update && \
            apt-get install -y --no-install-recommends postgresql-client && \
            rm -rf /var/lib/apt/lists/*

        RUN npm install -g rtlcss

        RUN useradd -m -d /opt/odoo -U -r -s /bin/bash odoo && \
            mkdir -p /var/lib/odoo /mnt/extra-addons /etc/odoo && \
            chown -R odoo:odoo /var/lib/odoo /mnt/extra-addons /etc/odoo

        RUN curl -sSL https://github.com/odoo/odoo/archive/refs/heads/saas-19.2.tar.gz \
            | tar xz -C /opt/odoo && \
            mv /opt/odoo/odoo-saas-19.2 /opt/odoo/odoo-server && \
            chown -R odoo:odoo /opt/odoo

        RUN pip3 install --no-cache-dir --break-system-packages \
            --ignore-installed cryptography \
            -r /opt/odoo/odoo-server/requirements.txt

        VOLUME ["/var/lib/odoo", "/mnt/extra-addons", "/etc/odoo"]
        EXPOSE 8069 8072
    environment:
      - SERVICE_FQDN_ODOO_8069
      - HOST=postgresql
      - USER=${SERVICE_USER_POSTGRES:-odoo}
      - PASSWORD=${SERVICE_PASSWORD_POSTGRES}
    volumes:
      - odoo-web-data:/var/lib/odoo
      - odoo-extra-addons:/mnt/extra-addons
      - odoo-config:/etc/odoo
    command:
      - bash
      - -lc
      - |
        set -e
        if [ -f /mnt/extra-addons/requirements.txt ]; then
          echo ">>> Installing extra pip packages from requirements.txt..."
          pip3 install --no-cache-dir --break-system-packages -r /mnt/extra-addons/requirements.txt
        fi
        chown -R odoo:odoo /var/lib/odoo /mnt/extra-addons /etc/odoo
        if [ ! -f /etc/odoo/odoo.conf ]; then
          cat > /etc/odoo/odoo.conf << EOF
        [options]
        db_host = $${HOST:-postgresql}
        db_port = 5432
        db_user = $${USER:-odoo}
        db_password = $${PASSWORD}
        data_dir = /var/lib/odoo
        addons_path = /opt/odoo/odoo-server/addons,/mnt/extra-addons
        http_interface = 0.0.0.0
        proxy_mode = True
        EOF
          chown odoo:odoo /etc/odoo/odoo.conf
        fi
        exec su odoo -c "python3 /opt/odoo/odoo-server/odoo-bin -c /etc/odoo/odoo.conf"
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://127.0.0.1:8069
      interval: 30s
      timeout: 15s
      retries: 60
      start_period: 120s
    depends_on:
      postgresql:
        condition: service_healthy
      addons-permissions:
        condition: service_completed_successfully

  postgresql:
    image: postgres:17-alpine
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${SERVICE_USER_POSTGRES:-odoo}
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}
      - POSTGRES_DB=postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER:-odoo} -d postgres
      interval: 5s
      timeout: 20s
      retries: 10

  addons-permissions:
    image: alpine:3.20
    user: "0:0"
    volumes:
      - odoo-extra-addons:/mnt/extra-addons
      - odoo-config:/etc/odoo
      - odoo-web-data:/var/lib/odoo
    command:
      - sh
      - -c
      - |
        set -e
        chown -R 101:101 /mnt/extra-addons
        chmod -R u+rwX,go+rX /mnt/extra-addons
        chown -R 101:101 /etc/odoo
        chmod -R u+rwX,go+rX /etc/odoo
        chown -R 101:101 /var/lib/odoo
        chmod -R u+rwX,go+rX /var/lib/odoo
    restart: "no"

  archive-manager:
    image: coderaiser/cloudcmd:latest
    user: "101:101"
    environment:
      - SERVICE_FQDN_ARCHIVE_8000
      - CLOUDCMD_USER=${SERVICE_USER_CLOUDCMD:-admin}
      - CLOUDCMD_PASSWORD=${SERVICE_PASSWORD_CLOUDCMD}
      - HOME=/tmp
    volumes:
      - odoo-extra-addons:/mnt/fs/extra-addons
      - odoo-web-data:/mnt/fs/odoo-data
      - odoo-config:/mnt/fs/odoo-config
    depends_on:
      addons-permissions:
        condition: service_completed_successfully
    command:
      - --root
      - /mnt/fs
      - --port
      - "8000"
      - --auth
      - --username
      - ${SERVICE_USER_CLOUDCMD:-admin}
      - --password
      - ${SERVICE_PASSWORD_CLOUDCMD}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:8000',r=>process.exit([200,301,302,401].includes(r.statusCode)?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  odoo-web-data:
  odoo-extra-addons:
  odoo-config:
  postgresql-data:
